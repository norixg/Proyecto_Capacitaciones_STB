services:
  capacitaciones_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: proyecto_capacitaciones_stb:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: warning
      SESSION_DRIVER: database
      SESSION_ENCRYPT: "true"
      SESSION_SECURE_COOKIE: "true"
      SESSION_HTTP_ONLY: "true"
      SESSION_SAME_SITE: lax
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "false"
    volumes:
      - production_uploads:/var/www/html/storage/app/public
      - production_logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  queue:
    image: proyecto_capacitaciones_stb:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "false"
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - production_uploads:/var/www/html/storage/app/public
      - production_logs:/var/www/html/storage/logs
    depends_on:
      capacitaciones_app:
        condition: service_healthy

  scheduler:
    image: proyecto_capacitaciones_stb:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "false"
    command: php artisan schedule:work
    volumes:
      - production_uploads:/var/www/html/storage/app/public
      - production_logs:/var/www/html/storage/logs
    depends_on:
      capacitaciones_app:
        condition: service_healthy

volumes:
  production_uploads:
  production_logs:
